<svg width="100%" viewBox="0 0 680 180" role="img" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">ETLPulse.AI — Intelligent Data Lineage Platform Logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo mark: three pipeline nodes (Extract, Transform, Load) with an EKG pulse waveform inside a circle, beside the ETLPulse.AI wordmark</desc>



<!-- Mark: outer ring -->
<circle cx="90" cy="90" r="54" fill="none" stroke="#fb4e0b" stroke-width="1.5" style="fill:none;stroke:rgb(251, 78, 11);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Mark: inner ring (double ring detail) -->
<circle cx="90" cy="90" r="48" fill="none" stroke="#fb4e0b" stroke-width="0.5" opacity="0.3" style="fill:none;stroke:rgb(251, 78, 11);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Subtle screen fill -->
<circle cx="90" cy="90" r="54" fill="#fb4e0b" fill-opacity="0.035" style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Horizontal baseline guide (very faint) -->
<line x1="36" y1="90" x2="144" y2="90" stroke="#fb4e0b" stroke-width="0.5" opacity="0.15" style="fill:rgb(0, 0, 0);stroke:rgb(251, 78, 11);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- EKG pulse path -->
<path d="M 36 90 H 60 L 73 48 L 84 124 L 90 90 H 107 L 115 70 L 119 90 H 144" fill="none" stroke="#fb4e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(251, 78, 11);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Pipeline node markers: E, T, L (drawn after path so they sit on top) -->
<circle cx="60" cy="90" r="4.5" fill="#fb4e0b" style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="90" cy="90" r="4.5" fill="#fb4e0b" style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="119" cy="90" r="4.5" fill="#fb4e0b" style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Node halos (depth) -->
<circle cx="60" cy="90" r="8" fill="none" stroke="#fb4e0b" stroke-width="0.75" opacity="0.35" style="fill:none;stroke:rgb(251, 78, 11);color:rgb(255, 255, 255);stroke-width:0.75px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="90" cy="90" r="8" fill="none" stroke="#fb4e0b" stroke-width="0.75" opacity="0.35" style="fill:none;stroke:rgb(251, 78, 11);color:rgb(255, 255, 255);stroke-width:0.75px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="119" cy="90" r="8" fill="none" stroke="#fb4e0b" stroke-width="0.75" opacity="0.35" style="fill:none;stroke:rgb(251, 78, 11);color:rgb(255, 255, 255);stroke-width:0.75px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Node labels -->
<text x="60" y="111" text-anchor="middle" style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;SF Pro Text&quot;, -apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:9.5px;font-weight:500;text-anchor:middle;dominant-baseline:auto">E</text>
<text x="90" y="111" text-anchor="middle" style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;SF Pro Text&quot;, -apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:9.5px;font-weight:500;text-anchor:middle;dominant-baseline:auto">T</text>
<text x="119" y="111" text-anchor="middle" style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;SF Pro Text&quot;, -apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:9.5px;font-weight:500;text-anchor:middle;dominant-baseline:auto">L</text>

<!-- Wordmark -->
<text y="114" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;SF Pro Display&quot;, -apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">
  <tspan x="163" style="fill:rgb(242, 237, 230);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;SF Pro Display&quot;, -apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">ETLPulse</tspan><tspan style="fill:rgb(251, 78, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;SF Pro Display&quot;, -apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">.AI</tspan>
</text>

<!-- Tagline -->
<text x="165" y="138" style="fill:rgb(92, 92, 92);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;SF Pro Text&quot;, -apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">INTELLIGENT DATA LINEAGE</text>

</svg>